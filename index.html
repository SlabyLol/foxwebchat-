<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FoxWebChat</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

#chat {
  height:400px;
  overflow-y:auto;
  border:1px solid #444;
  padding:10px;
  margin-top:10px;
  background:#1b1b1b;
}

.message {
  margin-bottom:8px;
}

button {
  cursor:pointer;
  margin-left:5px;
}

input {
  padding:6px;
}

.admin-text {
  color:red;
  font-weight:bold;
}

#adminPanel {
  margin-top:20px;
  border:2px solid red;
  padding:10px;
  display:none;
}

.box {
  border:1px solid red;
  margin:5px;
  padding:5px;
}
</style>
</head>
<body>

<h2>FoxWebChat</h2>

<input id="nameInput" placeholder="Name eingeben">
<button id="joinBtn">Join</button>

<div id="chat"></div>

<br>

<input id="msgInput" placeholder="Nachricht..." disabled>
<button id="sendBtn" disabled>Send</button>

<div id="adminPanel">
  <h3 style="color:red;">ADMIN PANEL</h3>
  <button id="clearChatBtn">Delete All Messages</button>
  <button id="clearReportsBtn">Delete All Reports</button>

  <h4>Reports:</h4>
  <div id="reportList"></div>

  <h4>Kicked Users:</h4>
  <div id="kickList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove, set, onValue }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "foxwebchat-bd592.firebaseapp.com",
  databaseURL: "https://foxwebchat-bd592-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "foxwebchat-bd592",
  storageBucket: "foxwebchat-bd592.firebasestorage.app",
  messagingSenderId: "7129134893",
  appId: "1:7129134893:web:3a85e2fa031661c5a6c5a4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username="";
let isAdmin=false;

/* Admin-Code verschlüsselt */
function checkAdmin(input){
  return btoa(input) === "QWRtaW5Kczkz4oKsPW5v";
}

/* JOIN */
document.getElementById("joinBtn").addEventListener("click",()=>{

  username=document.getElementById("nameInput").value.trim();
  if(!username) return alert("Name eingeben");

  if(checkAdmin(username)){
    isAdmin=true;
    username="ADMIN";
    document.getElementById("adminPanel").style.display="block";
    push(ref(db,"messages"),{user:"System",text:"ADMIN JOINED !BEWARE!"});
  } else {
    push(ref(db,"messages"),{user:"System",text:username+" joined"});
  }

  document.getElementById("nameInput").disabled=true;
  document.getElementById("joinBtn").disabled=true;
  document.getElementById("msgInput").disabled=false;
  document.getElementById("sendBtn").disabled=false;

  watchKickStatus();
});

/* SEND */
document.getElementById("sendBtn").addEventListener("click",()=>{
  const text=document.getElementById("msgInput").value.trim();
  if(!text) return;
  push(ref(db,"messages"),{user:username,text:text});
  document.getElementById("msgInput").value="";
});

/* LIVE CHAT */
onChildAdded(ref(db,"messages"), snap=>{
  const data=snap.val();
  const messageId=snap.key;

  const div=document.createElement("div");
  div.className="message";

  if(data.user==="ADMIN"||data.text==="ADMIN JOINED !BEWARE!"){
    div.classList.add("admin-text");
  }

  div.innerHTML="<b>"+data.user+":</b> "+data.text;

  // JETZT: Auch Admin darf reporten
  if(data.user!=="System"){
    const reportBtn=document.createElement("button");
    reportBtn.textContent="Report";

    reportBtn.onclick=()=>{
      const reason=prompt("Warum melden?");
      if(!reason) return;

      push(ref(db,"reports"),{
        reportedUser:data.user,
        messageText:data.text,
        messageId:messageId,
        reason:reason,
        reporter:username
      });
    };

    div.appendChild(reportBtn);
  }

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=
    document.getElementById("chat").scrollHeight;
});

/* REPORTS */
onChildAdded(ref(db,"reports"), snap=>{
  if(!isAdmin) return;

  const data=snap.val();
  const reportDiv=document.createElement("div");
  reportDiv.className="box";

  reportDiv.innerHTML=
    "<b>User:</b> "+data.reportedUser+"<br>"+
    "<b>Message:</b> "+data.messageText+"<br>"+
    "<b>Reason:</b> "+data.reason+"<br>"+
    "<b>Reported by:</b> "+data.reporter+"<br>";

  const kickBtn=document.createElement("button");
  kickBtn.textContent="Kick";

  kickBtn.onclick=()=>{
    set(ref(db,"kicks/"+data.reportedUser),{
      reason:data.reason
    });

    push(ref(db,"messages"),{
      user:"System",
      text:data.reportedUser+
      " got kicked. Reason: "+data.reason
    });

    reportDiv.remove();
  };

  reportDiv.appendChild(kickBtn);
  document.getElementById("reportList").appendChild(reportDiv);
});

/* KICK LIST (UserKick Liste) */
onChildAdded(ref(db,"kicks"), snap=>{
  if(!isAdmin) return;

  const user=snap.key;
  const data=snap.val();

  const div=document.createElement("div");
  div.className="box";
  div.textContent=user+" | Reason: "+data.reason;

  document.getElementById("kickList").appendChild(div);
});

/* DELETE ALL MESSAGES */
document.getElementById("clearChatBtn").onclick=()=>{
  if(isAdmin) remove(ref(db,"messages"));
};

/* DELETE ALL REPORTS */
document.getElementById("clearReportsBtn").onclick=()=>{
  if(isAdmin) remove(ref(db,"reports"));
};

/* WATCH KICK STATUS */
function watchKickStatus(){
  const kickRef=ref(db,"kicks/"+username);
  onValue(kickRef,snap=>{
    if(snap.exists()){
      showKickScreen(snap.val().reason);
    }
  });
}

/* BLACK SCREEN */
function showKickScreen(reason){
  document.body.innerHTML=`
  <div style="
    background:black;
    color:red;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    text-align:center;
  ">
    <h1>Oops! You got kicked by an Admin!</h1>
    <p>Reason: ${reason}</p>
  </div>
  `;
}
</script>

</body>
</html>
