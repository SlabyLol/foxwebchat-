<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FoxWebChat</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

#chat {
  height:400px;
  overflow-y:auto;
  border:1px solid #444;
  padding:10px;
  margin-top:10px;
  background:#1b1b1b;
}

.message {
  margin-bottom:5px;
}

button {
  cursor:pointer;
}
</style>
</head>
<body>

<h2>FoxWebChat</h2>

<input id="nameInput" placeholder="Name">
<button id="joinBtn" onclick="setName()">Join</button>

<div id="chat"></div>

<br>

<input id="msgInput" placeholder="Nachricht..." disabled>
<button id="sendBtn" onclick="sendMsg()" disabled>Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "foxwebchat-bd592.firebaseapp.com",
  databaseURL: "https://foxwebchat-bd592-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "foxwebchat-bd592",
  storageBucket: "foxwebchat-bd592.firebasestorage.app",
  messagingSenderId: "7129134893",
  appId: "1:7129134893:web:3a85e2fa031661c5a6c5a4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = "";

window.setName = function() {
  username = document.getElementById("nameInput").value.trim();
  if (!username) return alert("Name eingeben");

  push(ref(db, "messages"), {
    user:"System",
    text: username + " joined"
  });

  document.getElementById("msgInput").disabled = false;
  document.getElementById("sendBtn").disabled = false;

  document.getElementById("joinBtn").disabled = true;
  document.getElementById("nameInput").disabled = true;
};

window.sendMsg = function() {
  const text = document.getElementById("msgInput").value.trim();
  if (!text) return;

  push(ref(db, "messages"), {
    user: username,
    text: text
  });

  document.getElementById("msgInput").value = "";
};

function createMessageElement(data, key) {
  const div = document.createElement("div");
  div.className = "message";
  div.textContent = data.user + ": " + data.text;

  if (data.user !== "System") {
    const reportBtn = document.createElement("button");
    reportBtn.textContent = "Report";
    reportBtn.style.marginLeft = "10px";
    reportBtn.onclick = () => {
      const reason = prompt("Warum melden?");
      if (!reason) return;

      push(ref(db, "reports"), {
        reportedUser: data.user,
        message: data.text,
        reason: reason,
        timestamp: Date.now()
      });

      alert("Report gesendet");
    };

    div.appendChild(reportBtn);
  }

  return div;
}

onChildAdded(ref(db, "messages"), (snapshot) => {
  const data = snapshot.val();
  const key = snapshot.key;

  const element = createMessageElement(data, key);
  document.getElementById("chat").appendChild(element);

  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
});
</script>

</body>
</html>
